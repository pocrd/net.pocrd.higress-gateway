# Higress 网关配置文件
# 用于本地调试环境

# 全局配置
global:
  # 日志级别: debug, info, warning, error
  logLevel: info
  
  # 是否启用访问日志
  enableAccessLog: true
  
  # 访问日志格式
  accessLogFormat: |
    [%START_TIME%] "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %PROTOCOL%"
    %RESPONSE_CODE% %RESPONSE_FLAGS% %BYTES_RECEIVED% %BYTES_SENT% %DURATION%
    "%REQ(X-FORWARDED-FOR)%" "%REQ(USER-AGENT)%" "%REQ(X-REQUEST-ID)%"
    "%REQ(:AUTHORITY)%" "%UPSTREAM_HOST%" "%REQ(X-AUTH-USER)%"

# 插件配置
plugins:
  # 认证插件
  auth:
    enabled: true
    priority: 100
    
  # 限流插件
  rateLimit:
    enabled: false
    
  # 转换插件
  transformation:
    enabled: false

# gRPC/Triple 服务路由配置
routes:
  # Triple gRPC 路由 - GreeterService
  - name: greeter-service
    match:
      prefix: /com.pocrd.service_demo.api.GreeterService
    route:
      cluster: greeter-service
    plugins:
      auth:
        enabled: false

# 上游服务配置
clusters:
  - name: backend-service
    connectTimeout: 5s
    type: STRICT_DNS
    lbPolicy: ROUND_ROBIN
    loadAssignment:
      clusterName: backend-service
      endpoints:
        - lbEndpoints:
            - endpoint:
                address:
                  socketAddress:
                    address: backend-service
                    portValue: 8080
                    
  - name: admin-service
    connectTimeout: 5s
    type: STRICT_DNS
    lbPolicy: ROUND_ROBIN
    loadAssignment:
      clusterName: admin-service
      endpoints:
        - lbEndpoints:
            - endpoint:
                address:
                  socketAddress:
                    address: admin-service
                    portValue: 8081
  
  # Triple gRPC 服务集群 - GreeterService
  - name: greeter-service
    connectTimeout: 5s
    type: STATIC
    lbPolicy: ROUND_ROBIN
    # gRPC 协议配置 (HTTP/2)
    typedExtensionProtocolOptions:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        upstreamProtocolOptions:
          explicitHttpConfig:
            http2ProtocolOptions: {}
    loadAssignment:
      clusterName: greeter-service
      endpoints:
        - lbEndpoints:
            - endpoint:
                address:
                  socketAddress:
                    address: 172.18.0.4
                    portValue: 50051
