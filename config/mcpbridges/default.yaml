apiVersion: networking.higress.io/v1
kind: McpBridge
metadata:
  name: default
  namespace: higress-system
  creationTimestamp: "2000-01-01T00:00:00Z"
  resourceVersion: "1"
spec:
  registries:
  - domain: 127.0.0.1:8001
    name: higress-console
    port: 80
    type: static
  # Nacos 注册中心配置
  - name: nacos
    type: nacos2
    domain: nacos
    port: 8848
    nacosNamespaceId: public
    nacosGroups:
      - DEFAULT_GROUP
  # AI_REGISTRIES_START
  # AI_REGISTRIES_END
