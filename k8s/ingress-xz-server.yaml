apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xiaozhi-server-ingress
  namespace: higress-system
  annotations:
    higress.io/backend-protocol: HTTP
    higress.io/auth-tls-secret: https-server-secret-cacert
    higress.io/auth-tls-verify-depth: "3"
    # 连接池优化配置（ESP32 HTTP/1.1 场景）
    higress.io/upstream-keepalive-requests: "1000"    # 单个连接最大请求数
    higress.io/upstream-keepalive-timeout: "300"      # 空闲超时 5 分钟
    higress.io/upstream-idle-timeout: "300s"          # 空闲连接超时
spec:
  ingressClassName: higress
  tls:
  - hosts: ["xz.caringfamily.cn"]
    secretName: https-server-secret
  rules:
  - host: xz.caringfamily.cn
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091
      - path: /audio
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091
      - path: /uploads
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091