apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xiaozhi-server-ingress
  namespace: higress-system
  annotations:
    higress.io/backend-protocol: HTTP
spec:
  ingressClassName: higress
  tls:
  - hosts: ["x.caringfamily.cn"]
    secretName: https-server-secret
  rules:
  - host: x.caringfamily.cn
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091
      - path: /ws
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-server-static
            port:
              number: 8091
