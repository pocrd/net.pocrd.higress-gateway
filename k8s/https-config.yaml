# Higress HTTPS 配置
# 包含 TLS Secret 和 higress-https ConfigMap

---
# HTTPS 证书 Secret
# 注意：使用前需要将证书和密钥进行 base64 编码填入
apiVersion: v1
kind: Secret
metadata:
  name: https-server-secret
  namespace: higress-system
type: kubernetes.io/tls
data:
  tls.crt: ""
  tls.key: ""

---
# CA 证书 Secret（mTLS 场景使用）
apiVersion: v1
kind: Secret
metadata:
  name: https-server-secret-cacert
  namespace: higress-system
type: Opaque
data:
  # cat ca.crt | base64 -w 0
  ca.crt: ""

---
# Higress HTTPS 配置 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: higress-https
  namespace: higress-system
data:
  cert: |
    automaticHttps: false
    credentialConfig:
    - domains:
      - www.caringfamily.cn
      - caringfamily.cn
      tlsSecret: https-server-secret
    fallbackForInvalidSecret: false
    renewBeforeDays: 30
    version: "20260309000004"
