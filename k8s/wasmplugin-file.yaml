apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: auth-plugin
  namespace: higress-system
spec:
  # 使用 HTTP URL 加载 WASM 文件
  url: http://host.docker.internal:8888/auth-plugin.wasm
  
  # 插件执行阶段
  phase: AUTHN
  
  # 插件优先级
  priority: 100
  
  # 匹配条件
  matchRules:
    - ingress:
        - greeter-ingress
