apiVersion: networking.higress.io/v1
kind: McpBridge
metadata:
  name: default
  namespace: higress-system
  labels:
    managed-by: higress-deploy
    app.kubernetes.io/name: higress
    app.kubernetes.io/component: mcpbridge
spec:
  registries:
  # Higress Console 静态配置
  - domain: 127.0.0.1:8001
    name: higress-console
    port: 80
    type: static
  # Nacos 注册中心配置
  - name: nacos
    type: nacos2
    domain: nacos
    port: 8848
    nacosNamespaceId: public
    nacosGroups:
      - PUBLIC-GROUP
  - name: xiaozhi-server
    type: static
    domain: 127.0.0.1  # 或实际 IP
    port: 8091
  - name: xiaozhi-web
    type: static
    domain: 127.0.0.1  # 替换为实际 IP
    port: 8084