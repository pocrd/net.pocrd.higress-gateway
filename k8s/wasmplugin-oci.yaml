# WASM 插件配置 - OCI 镜像方式
# 官方 Chart 原生支持通过 WasmPlugin CRD 加载 OCI 镜像

---
# 1. 认证插件 - auth-plugin
# 用于 API 请求的认证和鉴权
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: auth-plugin
  namespace: higress-system
  labels:
    managed-by: higress-deploy
spec:
  # OCI 镜像地址
  url: oci://crpi-76icqljpukx0sgec.cn-hangzhou.personal.cr.aliyuncs.com/caringfamily/auth-plugin:v1.0.1
  
  # 插件执行阶段：AUTHN (认证阶段，最先执行)
  phase: AUTHN
  
  # 插件优先级：数字越大优先级越高 (同阶段内)
  priority: 100
  
  # 匹配条件：应用到指定的 Ingress
  matchRules:
    - ingress:
        - dubbo-ingress
        - xiaozhi-server-ingress

---
# 2. 自定义响应插件 - custom-response
# 用于返回自定义 HTML 页面 (Mock 响应)
apiVersion: extensions.higress.io/v1alpha1
kind: WasmPlugin
metadata:
  name: custom-response
  namespace: higress-system
spec:
  # OCI 镜像地址：官方提供的 custom-response 插件
  url: oci://higress-registry.cn-hangzhou.cr.aliyuncs.com/plugins/custom-response:latest
  
  # 插件执行阶段：AUTHN (认证阶段)
  phase: AUTHN
  
  # 插件优先级：910 (最高优先级)
  priority: 910
  
  # 匹配条件：只应用到 homepage-ingress
  matchRules:
    - ingress:
        - homepage-ingress
      # 插件配置 (按照官方文档格式)
      config:
        status_code: "200"
        body: "<!DOCTYPE html><html lang=\"zh-CN\"><head><meta charset=\"UTF-8\"><meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\"><title>药盯铛 - 智能健康管理解决方案</title><style>body {font-family: Arial, sans-serif;margin: 0;padding: 0;background-color: #fdf6e3;}header {background-color: #8bc34a;color: white;display: flex;align-items: center;justify-content: center;padding: 20px;}header img {max-width: 80px;margin-right: 20px;}header .title {text-align: left;}header .title h1 {margin: 0;font-size: 2em;}header .title p {margin: 5px 0 0;font-size: 1.2em;}main {padding: 20px;max-width: 1200px;margin: 0 auto;}main h2 {font-size: 2em;margin-bottom: 20px;text-align: center;}main p {font-size: 1.2em;line-height: 1.8;color: #333;margin-bottom: 20px;}.section {margin-bottom: 40px;}.section h3 {font-size: 1.8em;margin-bottom: 10px;color: #8bc34a;}.features {display: flex;flex-wrap: wrap;justify-content: space-around;}.feature {background-color: #fff;box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);border-radius: 10px;padding: 20px;margin: 10px;flex: 1 1 calc(30% - 20px);text-align: center;}.feature img {max-width: 100%;height: auto;border-radius: 5px;}.feature h4 {margin-top: 15px;font-size: 1.5em;}.testimonial {background-color: #fff;box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);border-radius: 10px;padding: 20px;margin: 20px 0;font-size: 1.1em;line-height: 1.8;color: #555;}footer {background-color: #8bc34a;color: white;text-align: center;padding: 15px;}</style></head><body><header><img src=\"https://res.caringfamily.cn/s/144x144.png\" alt=\"药盯铛 Logo\"><div class=\"title\"><h1>药盯铛</h1><p>智慧关爱，贴心守护</p></div></header><main><section id=\"about\" class=\"section\"><h2>关于药盯铛</h2><p>药盯铛是一款创新的健康关爱产品，旨在通过智能化的解决方案帮助用户更轻松地管理健康计划，提升生活质量。这不仅是一款工具，更是一座桥梁，连接起人与人之间的关爱与责任。药盯铛倡导有能力的人为其亲属或友人提供帮助，共同营造健康的生活环境。通过技术与关爱的结合，药盯铛将复杂的健康管理流程简化为清晰可行的计划，让每个人都能享受到来自家人和朋友的贴心守护。</p><p>不论您是工作繁忙的上班族，远离父母的异地子女，还是希望呵护孩子健康成长的父母，药盯铛都能成为您生活中的得力助手。我们深知健康管理的重要性，更懂得关爱是连接亲情与友情的纽带。药盯铛以智能设备和人性化服务为依托，致力于让每一份关怀都能得到落实，让每一次健康计划都能被完美执行。</p></section><section id=\"features\" class=\"section\"><h2>核心功能</h2><div class=\"features\"><div class=\"feature\"><img src=\"data:image/webp;base64,\" alt=\"智能提醒\"><h4>智能提醒</h4><p>确保被照顾者按时完成健康计划，如服药、锻炼和饮水。系统通过科学的时间安排和贴心的提醒服务，让健康管理更高效。</p></div><div class=\"feature\"><img src=\"data:image/webp;base64,\" alt=\"计划定制\"><h4>健康计划定制</h4><p>根据个人需求，由亲友或健康顾问为用户量身定制最适合的健康方案。支持灵活调整，确保计划与实际需求完美契合。</p></div><div class=\"feature\"><img src=\"data:image/webp;base64,\" alt=\"设备联动\"><h4>设备联动</h4><p>与智能药箱和手环等设备配合使用，实现精准的健康管理。实时数据同步，确保每个健康细节都被记录和落实。</p></div></div></section><section id=\"scenarios\" class=\"section\"><h2>适用场景</h2><p><strong>家庭健康管理：</strong>帮助用户更好地照顾家中的老人与儿童，让爱与关怀贯穿每一天。</p><p><strong>远程健康支持：</strong>为异地的亲友提供健康提醒和实时支持，无论距离多远，关怀从未间断。</p><p><strong>专业健康护理：</strong>辅助医疗机构或护理人员为患者提供个性化服务，为健康管理提供更多专业保障。</p><p>无论是家庭场景还是专业护理环境，药盯铛都能因地制宜地提供高效的解决方案，让每一份健康管理都体现出人文关怀的力量。</p></section><section id=\"testimonials\" class=\"section\"><h2>用户评价</h2><div class=\"testimonial\"><p>“药盯铛让我们全家人的健康管理变得轻松又高效。我每天收到及时的提醒，确保父母按时服药，再也不用担心忘记了！” - 李女士</p></div><div class=\"testimonial\"><p>“远在异地的孩子通过药盯铛关心我的日常健康。这种跨越距离的关爱让我觉得无比温暖。” - 王先生</p></div><div class=\"testimonial\"><p>“作为一名护理人员，我深知健康计划执行的难度。药盯铛的智能设备和贴心设计大大提高了工作效率，让患者和家属都倍感满意。” - 张护士</p></div></section></main><footer><p>&copy; 2024 药盯铛 | 智能健康管理解决方案</p><p><a href=\"#\">隐私政策</a> | <a href=\"#\">服务条款</a></p><a target=\"_blank\" href=\"https://beian.miit.gov.cn\" tm=\"482\" style=\"color: rgb(152, 152, 152);\">京ICP备2024045520号-3</a></footer></body></html>"
        headers:
          - "Content-Type=text/html; charset=utf-8"
        # 重要：必须设置 skip_route 为 false，确保 matchRules 生效
        skip_route: "false"
