apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    managed-by: higress-deploy
  name: xiaozhi-web-ingress
  namespace: higress-system
  annotations:
    higress.io/backend-protocol: HTTP
    higress.io/destination: xiaozhi-web.higress-system.static
spec:
  ingressClassName: higress
  tls:
  - hosts:
    - xz.caringfamily.cn
    secretName: https-server-secret
  rules:
  - host: xz.caringfamily.cn
    http:
      paths:
      - path: /xz
        pathType: Prefix
        backend:
          service:
            name: xiaozhi-web.higress-system.static
            port:
              number: 8085