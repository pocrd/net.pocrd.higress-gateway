networks:
  higress-net:
    driver: bridge

services:
  # 注册中心：Nacos 3.1.1
  nacos:
    image: nacos-registry.cn-hangzhou.cr.aliyuncs.com/nacos/nacos-server:v3.1.1
    container_name: nacos-server
    environment:
      - MODE=standalone
      - JVM_XMS=512m
      - JVM_XMX=512m
      - NACOS_AUTH_ENABLE=false
      # Nacos 3.x 启动必须项：32位字符串的 Base64 编码
      - NACOS_AUTH_TOKEN=U2VjcmV0S2V5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5
      - NACOS_AUTH_IDENTITY_KEY=serverIdentity
      - NACOS_AUTH_IDENTITY_VALUE=security
    ports:
      - "8848:8848"
      - "8080:8080"
      - "9848:9848"
      - "9849:9849"
    volumes:
      - ./nacos/data:/home/nacos/data
      - ./nacos/logs:/home/nacos/logs
    networks:
      - higress-net
    restart: always
    deploy:
      resources:
        limits:
          memory: 1.5G
        reservations:
          memory: 512M

  # 网关：Higress
  higress:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/all-in-one:2.1.11
    container_name: higress-gateway
    environment:
      - KUBECONFIG=""
      - HIGRESS_LOCAL_CONFIG_PATH=/data
      - CONFIG_PATH=/data/conf
      - CONFIG_SYNC_MODE=file
      - TZ=Asia/Shanghai
      - GATEWAY_HTTP_PORT=80
      - GATEWAY_HTTPS_PORT=443
      - ENABLE_AUTOMATIC_HTTPS=true
    ports:
      - "80:80"
      - "443:443"
      - "8001:8001"
    volumes:
      - ./higress-data:/data
    depends_on:
      - nacos
    networks:
      - higress-net
    restart: always
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
